name: "Principal"
on:
  push:
    branches: [main]
defaults:
  run:
    working-directory: .
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Nix
        uses: cachix/install-nix-action@v31

      - name: Exibir versões das ferramentas
        run: |
          echo "=== latexmk ==="
          nix develop --command latexmk -v
          echo ""
          echo "=== lualatex ==="
          nix develop --command lualatex --version

      - name: Limpar artefatos anteriores (clean build)
        run: |
          git clean -xfd --exclude='.nix-*' --exclude='result' || true
          nix develop --command latexmk -C main.tex || true

      - name: Construir PDF
        run: nix develop --command latexmk -cd main.tex

      - name: Fazer upload dos artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main
          path: |
            *.pdf
            *.log
